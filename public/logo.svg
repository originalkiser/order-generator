<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#4f8ef7"/>
      <stop offset="100%" stop-color="#7b5bf7"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect width="512" height="512" rx="114" fill="url(#g)"/>
  <!-- Three ascending bars, all resting on the same baseline -->
  <rect x="88"  y="330" width="82" height="114" rx="15" fill="rgba(255,255,255,0.48)"/>
  <rect x="214" y="226" width="82" height="218" rx="15" fill="rgba(255,255,255,0.74)"/>
  <rect x="340" y="130" width="82" height="314" rx="15" fill="white"/>
  <!-- Upward-trend arrow emerging from tallest bar -->
  <line x1="381" y1="64" x2="381" y2="122" stroke="white" stroke-width="22" stroke-linecap="round"/>
  <polyline points="355,92 381,64 407,92" fill="none" stroke="white" stroke-width="22" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
